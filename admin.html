<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Адмінка альтанки</title>
<style>
body{font-family:Arial;background:#f6f7fb;text-align:center;padding:20px}
.box{background:white;max-width:430px;margin:20px auto;padding:20px;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
input,select,button{width:100%;box-sizing:border-box;padding:12px;margin-top:10px;border-radius:8px;border:1px solid #ccc;font-size:16px}
button{background:#222;color:white;border:none;cursor:pointer}
.success{color:green;font-weight:bold}
.error{color:red;font-weight:bold}
</style>
</head>
<body>

<h2>🔐 Адмінка бронювання альтанки</h2>

<div class="box">
  <input id="adminCode" type="password" placeholder="Адмін-код">

  <select id="listType">
    <option value="debtors">Боржники</option>
    <option value="blacklist">Чорний список</option>
  </select>

  <input id="apartment" type="text" placeholder="Номер квартири">
  <input id="reason" type="text" placeholder="Причина">

  <button onclick="manage('add')">Додати</button>
  <button onclick="manage('remove')">Видалити</button>

  <p id="msg"></p>
</div>

<script>
const SUPABASE_URL = "https://dsnnotagqmjexhxoemzg.supabase.co";
const SUPABASE_KEY = "sb_publishable_JHN_dMmICNsmBCpniC81xw_WVCiRD7u";

async function manage(action){
  const adminCode = document.getElementById("adminCode").value.trim();
  const list = document.getElementById("listType").value;
  const apartment = document.getElementById("apartment").value.trim();
  const reason = document.getElementById("reason").value.trim();
  const msg = document.getElementById("msg");

  if(!adminCode || !apartment){
    msg.className = "error";
    msg.innerText = "Заповніть адмін-код і номер квартири";
    return;
  }

  const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/admin_manage_list", {
    method:"POST",
    headers:{
      apikey: SUPABASE_KEY,
      Authorization:"Bearer " + SUPABASE_KEY,
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      p_admin_code: adminCode,
      p_list: list,
      p_action: action,
      p_apartment: apartment,
      p_reason: reason
    })
  });

  const text = await res.text();

  if(text.includes("ACCESS_DENIED")){
    msg.className = "error";
    msg.innerText = "Невірний адмін-код";
    return;
  }

  if(!res.ok || !text.includes("OK")){
    msg.className = "error";
    msg.innerText = "Помилка виконання";
    return;
  }

  msg.className = "success";
  msg.innerText = action === "add" ? "Додано успішно" : "Видалено успішно";
}
</script>

</body>
</html>
