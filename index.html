<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Альтанка Booking</title>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }
.calendar {
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:5px;
  max-width:420px;
  margin:auto;
}
.day {
  padding:15px;
  background:white;
  border:1px solid #ddd;
  cursor:pointer;
}
.free { background:#c8f7c5; }
.booked { background:#ffb3b3; pointer-events:none; }
</style>
</head>

<body>

<h2>🏡 Альтанка Booking</h2>
<div id="calendar" class="calendar"></div>

<script>

const SUPABASE_URL = "https://dsnnotagqmjexhxoemzg.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_JHN_dMmICNsmBCpniC81xw_WVCiRD7u";

async function loadBookings(){
  let res = await fetch(SUPABASE_URL + "/rest/v1/bookings?select=*",
  {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  let data = await res.json();
  render(data);
}

function render(data){

  const booked = data.map(b => b.date);

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=30;i++){

    let date = "2026-06-" + String(i).padStart(2,'0');

    let div = document.createElement("div");
    div.className = "day " + (booked.includes(date) ? "booked" : "free");
    div.innerHTML = i;

    if(!booked.includes(date)){
      div.onclick = async () => {

        let apartment = prompt("Квартира:");
        let name = prompt("Ім'я:");

        await fetch(SUPABASE_URL + "/rest/v1/bookings", {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({date, apartment, name})
        });

        loadBookings();
      }
    }

    cal.appendChild(div);
  }
}

loadBookings();

</script>

</body>
</html>
