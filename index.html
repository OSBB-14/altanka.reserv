<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Альтанка Booking PRO</title>

<style>
body{
  font-family: Arial;
  background:#f6f7fb;
  text-align:center;
}

h2{ margin-top:20px; }

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:10px;
}

button{
  padding:8px 12px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.calendar{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:6px;
  max-width:500px;
  margin:20px auto;
}

.day{
  background:white;
  border-radius:10px;
  padding:14px;
  cursor:pointer;
  border:1px solid #ddd;
  transition:0.2s;
}

.day:hover{
  transform:scale(1.05);
}

.free{ background:#d6f5d6; }
.booked{ background:#ffb3b3; pointer-events:none; }

.weekday{
  font-weight:bold;
  font-size:12px;
  opacity:0.6;
}
</style>
</head>

<body>

<h2>🏡 Альтанка Booking</h2>

<div class="header">
  <button onclick="prevMonth()">⬅</button>
  <div id="monthTitle"></div>
  <button onclick="nextMonth()">➡</button>
</div>

<div class="calendar" id="calendar"></div>

<script>

const SUPABASE_URL = "https://dsnnotagqmjexhxoemzg.supabase.co";
const SUPABASE_KEY = "sb_publishable_JHN_dMmICNsmBCpniC81xw_WVCiRD7u";

let today = new Date();
let currentMonth = today.getMonth();
let currentYear = today.getFullYear();

let bookings = [];

async function loadBookings(){
  let res = await fetch(SUPABASE_URL + "/rest/v1/bookings?select=*", {
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  bookings = await res.json();
  render();
}

function render(){

  const cal = document.getElementById("calendar");
  const title = document.getElementById("monthTitle");

  cal.innerHTML = "";

  let monthName = new Date(currentYear, currentMonth)
    .toLocaleString("uk-UA", {month:"long"});

  title.innerHTML = `${monthName} ${currentYear}`;

  let firstDay = new Date(currentYear, currentMonth, 1).getDay();
  let daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

  let bookedDates = bookings.map(b => b.date);

  const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];

  weekdays.forEach(d=>{
    let div=document.createElement("div");
    div.className="weekday";
    div.innerText=d;
    cal.appendChild(div);
  });

  for(let i=0;i<firstDay-1;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=daysInMonth; d++){

    let date = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    let div = document.createElement("div");
    div.className = "day " + (bookedDates.includes(date) ? "booked" : "free");
    const booking = bookings.find(b => b.date === date);
    div.innerHTML = booking
    ? d + "<br><small>🏠 " + booking.apartment + "<br>📞 " + booking.phone + "</small>"
    : d;

    if(!bookedDates.includes(date)){
      div.onclick = async () => {

        let apartment = prompt("Квартира:");
        let name = prompt("Ім'я:");
        let phone = prompt("Телефон:");

        let res = await fetch(SUPABASE_URL + "/rest/v1/bookings", {
          method:"POST",
          headers:{
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type":"application/json"
          },
          body: JSON.stringify({date, apartment, name, phone})
        });

        if(res.status === 409 || !res.ok){
  alert("❌ Дата вже зайнята");
  loadBookings();
  return;
}
        loadBookings();
      }
    }

    cal.appendChild(div);
  }
}

function nextMonth(){
  currentMonth++;
  if(currentMonth>11){
    currentMonth=0;
    currentYear++;
  }
  render();
}

function prevMonth(){
  currentMonth--;
  if(currentMonth<0){
    currentMonth=11;
    currentYear--;
  }
  render();
}

loadBookings();

</script>

</body>
</html>
