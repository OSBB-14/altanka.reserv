<script>

const SUPABASE_URL = "https://dsnnotagqmjexhxoemzg.supabase.co";
const SUPABASE_KEY = "sb_publishable_JHN_dMmICNsmBCpniC81xw_WVCiRD7u";

async function loadBookings(){

  let res = await fetch(SUPABASE_URL + "/rest/v1/bookings?select=*", {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  let data = await res.json();
  render(data);
}

function render(data){

  const booked = data.map(b => b.date);

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  for(let i=1;i<=30;i++){

    let date = "2026-06-" + String(i).padStart(2,'0');

    let div = document.createElement("div");
    div.className = "day " + (booked.includes(date) ? "booked" : "free");
    div.innerHTML = i;

    if(!booked.includes(date)){
      div.onclick = async () => {

        let apartment = prompt("Квартира:");
        let name = prompt("Ім'я:");

        let res = await fetch(SUPABASE_URL + "/rest/v1/bookings", {
          method: "POST",
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({date, apartment, name})
        });

        if(!res.ok){
          alert("❌ Ця дата вже зайнята");
          return;
        }

        loadBookings();
      }
    }

    cal.appendChild(div);
  }
}

loadBookings();

</script>
