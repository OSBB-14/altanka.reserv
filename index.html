<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Альтанка Booking PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js"></script>

<style>
body{
  font-family: Arial;
  background:#f6f7fb;
  text-align:center;
}

h2{ margin-top:20px; }

.header{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin:10px;
}

button{
  padding:8px 12px;
  border:none;
  background:#222;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.calendar{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  gap:6px;
  max-width:500px;
  margin:20px auto;
}

.day{
  background:white;
  border-radius:10px;
  padding:14px;
  cursor:pointer;
  border:1px solid #ddd;
  transition:0.2s;
}

.day:hover{
  transform:scale(1.05);
}

.free{ background:#d6f5d6; }
.booked{ background:#ffb3b3; pointer-events:none; }

.weekday{
  font-weight:bold;
  font-size:12px;
  opacity:0.6;
}

/* 🔥 toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  color:white;
  padding:12px 20px;
  border-radius:8px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<h2>🏡 Альтанка Booking</h2>

<div class="header">
  <button onclick="prevMonth()">⬅</button>
  <div id="monthTitle"></div>
  <button onclick="nextMonth()">➡</button>
</div>

<div class="calendar" id="calendar"></div>

<div id="toast" class="toast"></div>

<script>

const SUPABASE_URL = "https://dsnnotagqmjexhxoemzg.supabase.co";
const SUPABASE_KEY = "sb_publishable_JHN_dMmICNsmBCpniC81xw_WVCiRD7u";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let today = new Date();
let currentMonth = today.getMonth();
let currentYear = today.getFullYear();

let bookings = [];
let lastChangeDate = null;

const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function showToast(text){
  const t = document.getElementById("toast");
  t.innerText = text;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
  }, 3000);
}

async function loadBookings(){
  let { data } = await client.from("bookings").select("*");
  bookings = data || [];
  render();
}

function render(){

  const cal = document.getElementById("calendar");
  const title = document.getElementById("monthTitle");

  cal.innerHTML = "";

  let monthName = new Date(currentYear, currentMonth)
    .toLocaleString("uk-UA", {month:"long"});

  title.innerHTML = `${monthName} ${currentYear}`;

  let firstDay = new Date(currentYear, currentMonth, 1).getDay();
  let daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

  const bookingMap = new Map(bookings.map(b => [b.date, b]));

  const weekdays = ["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];

  weekdays.forEach(d=>{
    let div=document.createElement("div");
    div.className="weekday";
    div.innerText=d;
    cal.appendChild(div);
  });

  for(let i=0;i<firstDay-1;i++){
    cal.appendChild(document.createElement("div"));
  }

  for(let d=1; d<=daysInMonth; d++){

    let date = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    const booking = bookingMap.get(date);

    let div = document.createElement("div");
    div.className = "day " + (booking ? "booked" : "free");

    if(date === lastChangeDate){
      div.style.border = "3px solid #000";
    }

    div.innerHTML = booking
      ? d + "<br><small>🏠 " + booking.apartment + "<br>📞 " + booking.phone + "</small>"
      : d;

    if(!booking){
      div.onclick = async () => {

        let apartment = prompt("Квартира:");
        let name = prompt("Ім'я:");
        let phone = prompt("Телефон:");

        let { error } = await client
          .from("bookings")
          .insert([{date, apartment, name, phone}]);

        if(error){
          showToast("❌ Дата вже зайнята");
          return;
        }
      }
    }

    cal.appendChild(div);
  }
}

// 🔥 realtime
client
  .channel("bookings-live")
  .on(
    "postgres_changes",
    { event: "INSERT", schema: "public", table: "bookings" },
    payload => {

      lastChangeDate = payload.new.date;

      audio.play();
      showToast("⚡ Нове бронювання: " + payload.new.date);

      loadBookings();
    }
  )
  .subscribe();

function nextMonth(){
  currentMonth++;
  if(currentMonth>11){
    currentMonth=0;
    currentYear++;
  }
  render();
}

function prevMonth(){
  currentMonth--;
  if(currentMonth<0){
    currentMonth=11;
    currentYear--;
  }
  render();
}

loadBookings();

</script>

</body>
</html>
